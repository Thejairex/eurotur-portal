        <script>
            document.addEventListener('DOMContentLoaded', async function () {
                const loading = document.getElementById('__bundler_loading');
                function setStatus(msg) {
                    if (loading) loading.textContent = msg;
                }

                const FONT_MIME =
                    /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
                const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
                function toBase64(bytes) {
                    let bin = '';
                    for (let i = 0; i < bytes.length; i += 0x8000) {
                        bin += String.fromCharCode.apply(
                            null,
                            bytes.subarray(i, i + 0x8000),
                        );
                    }
                    return btoa(bin);
                }

                // Error sink persists across replaceWith since it's on window, not the DOM.
                window.addEventListener(
                    'error',
                    function (e) {
                        // Failed resource loads (CSP-blocked links, scripts, images) fire plain
                        // events at the element — warn only; real JS errors carry message/error.
                        if (
                            !e.message &&
                            !e.error &&
                            e.target &&
                            e.target !== window
                        ) {
                            console.warn(
                                '[bundle] resource failed to load:',
                                e.target.tagName,
                                String(e.target.src || e.target.href || ''),
                            );
                            return;
                        }
                        var p = document.body || document.documentElement;
                        var d =
                            document.getElementById('__bundler_err') ||
                            p.appendChild(document.createElement('div'));
                        d.id = '__bundler_err';
                        d.style.cssText =
                            'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
                        d.textContent =
                            (d.textContent
                                ? d.textContent + String.fromCharCode(10)
                                : '') +
                            '[bundle] ' +
                            (e.message || e.type) +
                            (e.filename
                                ? ' (' +
                                  e.filename.slice(0, 60) +
                                  ':' +
                                  e.lineno +
                                  ')'
                                : '');
                    },
                    true,
                );

                try {
                    const manifestEl = document.querySelector(
                        'script[type="__bundler/manifest"]',
                    );
                    const templateEl = document.querySelector(
                        'script[type="__bundler/template"]',
                    );
                    if (!manifestEl || !templateEl) {
                        setStatus('Error: missing bundle data');
                        console.error(
                            '[bundler] Missing script tags — manifestEl:',
                            !!manifestEl,
                            'templateEl:',
                            !!templateEl,
                        );
                        return;
                    }

                    const manifest = JSON.parse(manifestEl.textContent);
                    let template = JSON.parse(templateEl.textContent);

                    const uuids = Object.keys(manifest);
                    setStatus('Unpacking ' + uuids.length + ' assets...');

                    const blobUrls = {};
                    const resourceBlobs = {};
                    await Promise.all(
                        uuids.map(async (uuid) => {
                            const entry = manifest[uuid];
                            try {
                                const binaryStr = atob(entry.data);
                                const bytes = new Uint8Array(binaryStr.length);
                                for (let i = 0; i < binaryStr.length; i++)
                                    bytes[i] = binaryStr.charCodeAt(i);

                                let finalBytes = bytes;
                                if (entry.compressed) {
                                    if (
                                        typeof DecompressionStream !==
                                        'undefined'
                                    ) {
                                        const ds = new DecompressionStream(
                                            'gzip',
                                        );
                                        const writer = ds.writable.getWriter();
                                        const reader = ds.readable.getReader();
                                        writer.write(bytes);
                                        writer.close();
                                        const chunks = [];
                                        let totalLen = 0;
                                        while (true) {
                                            const { done, value } =
                                                await reader.read();
                                            if (done) break;
                                            chunks.push(value);
                                            totalLen += value.length;
                                        }
                                        finalBytes = new Uint8Array(totalLen);
                                        let offset = 0;
                                        for (const chunk of chunks) {
                                            finalBytes.set(chunk, offset);
                                            offset += chunk.length;
                                        }
                                    } else {
                                        console.warn(
                                            'DecompressionStream not available, asset ' +
                                                uuid +
                                                ' may not render',
                                        );
                                    }
                                }

                                if (
                                    FONT_MIME.test(entry.mime) &&
                                    MIME_TOKEN.test(entry.mime)
                                ) {
                                    // Strict artifact hosts allow font-src data: but not blob:.
                                    blobUrls[uuid] =
                                        'data:' +
                                        entry.mime +
                                        ';base64,' +
                                        (entry.compressed
                                            ? toBase64(finalBytes)
                                            : entry.data);
                                } else {
                                    const blob = new Blob([finalBytes], {
                                        type: entry.mime,
                                    });
                                    blobUrls[uuid] = URL.createObjectURL(blob);
                                    resourceBlobs[blobUrls[uuid]] = blob;
                                }
                            } catch (err) {
                                console.error(
                                    'Failed to decode asset ' + uuid + ':',
                                    err,
                                );
                                const blob = new Blob([], { type: entry.mime });
                                blobUrls[uuid] = URL.createObjectURL(blob);
                                resourceBlobs[blobUrls[uuid]] = blob;
                            }
                        }),
                    );

                    const extResEl = document.querySelector(
                        'script[type="__bundler/ext_resources"]',
                    );
                    const extResources = extResEl
                        ? JSON.parse(extResEl.textContent)
                        : [];
                    const resourceMap = {};
                    for (const entry of extResources) {
                        if (blobUrls[entry.uuid])
                            resourceMap[entry.id] = blobUrls[entry.uuid];
                    }

                    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
                    // consumers read these Blobs directly. Survives the swap like the error sink.
                    window.__resourceBlobs = resourceBlobs;

                    setStatus('Rendering...');
                    for (const uuid of uuids)
                        template = template.split(uuid).join(blobUrls[uuid]);

                    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
                    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
                    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
                    template = template
                        .replace(/\s+integrity="[^"]*"/gi, '')
                        .replace(/\s+crossorigin="[^"]*"/gi, '');

                    const resourceScript =
                        '<script>window.__resources = ' +
                        JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
                        ';</' +
                        'script>';
                    // Inject after <head> so the DOCTYPE stays first; prepending the script
                    // would push the parser into quirks mode. DOMParser always emits a <head>
                    // (synthesizing one if the source HTML omitted it) but may carry
                    // attributes through, so match the full opening tag. slice() rather than
                    // replace() keeps us clear of $-pattern substitution in resourceScript.
                    const headOpen = template.match(/<head[^>]*>/i);
                    if (headOpen) {
                        const i = headOpen.index + headOpen[0].length;
                        template =
                            template.slice(0, i) +
                            resourceScript +
                            template.slice(i);
                    }

                    // Parse the template and swap the root element. Scripts inserted via
                    // DOMParser/replaceWith are inert per spec — re-create each with
                    // createElement so they execute, awaiting onload for src scripts to
                    // preserve ordering (React before ReactDOM before Babel before text/babel).
                    const doc = new DOMParser().parseFromString(
                        template,
                        'text/html',
                    );
                    document.documentElement.replaceWith(doc.documentElement);
                    const dead = Array.from(document.scripts);
                    for (const old of dead) {
                        const s = document.createElement('script');
                        for (const a of old.attributes)
                            s.setAttribute(a.name, a.value);
                        s.textContent = old.textContent;
                        // text/babel scripts with a src: read and inline. transformScriptTags
                        // does XHR against the src, but blob:null/ from a file:// origin is
                        // silently dropped. Inlining makes it a plain inline babel script,
                        // which transformScriptTags handles unconditionally.
                        if (
                            (s.type === 'text/babel' ||
                                s.type === 'text/jsx') &&
                            s.src
                        ) {
                            const pre = resourceBlobs[s.src.split('#')[0]];
                            s.textContent = pre
                                ? await pre.text()
                                : await (await fetch(s.src)).text();
                            s.removeAttribute('src');
                        }
                        const p = s.src
                            ? new Promise(function (r) {
                                  s.onload = s.onerror = r;
                              })
                            : null;
                        old.replaceWith(s);
                        if (p) await p;
                    }
                    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
                    // which fired before we swapped the document. Trigger manually if present.
                    if (
                        window.Babel &&
                        typeof window.Babel.transformScriptTags === 'function'
                    ) {
                        window.Babel.transformScriptTags();
                    }
                } catch (err) {
                    setStatus('Error unpacking: ' + err.message);
                    console.error('Bundle unpack error:', err);
                }
            });
        </script>

tyle=\"font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#666;\">seguridad<\u002Fdiv>\n              <div style=\"display:flex; align-items:flex-start; gap:16px; margin-top:12px;\">\n                <span style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:clamp(40px,5vw,66px); line-height:0.78; letter-spacing:-0.03em; color:#E30613;\">05<\u002Fspan>\n                <h2 style=\"margin:0; font-family:'Archivo',sans-serif; font-weight:900; font-size:clamp(24px,3vw,36px); line-height:0.92; letter-spacing:-0.02em; text-transform:uppercase;\">Cambio de<br>contraseña<\u002Fh2>\n              <\u002Fdiv>\n              <p style=\"margin:18px 0 0; font-size:13.5px; line-height:1.55; color:#333; max-width:320px;\">Desde la notebook. El cambio se propaga a todos los accesos.<\u002Fp>\n              <div style=\"border:1px solid #000; padding:15px 18px; margin-top:22px;\">\n                <div style=\"font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:#E30613;\">importante<\u002Fdiv>\n                <p style=\"margin:8px 0 0; font-size:13px; line-height:1.5; color:#333;\">Debe ser segura: letras, números y símbolos. Una vez actualizada, aplica en <b>TS, VPN, Spark<\u002Fb>, etc.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border-top:2px solid #000;\">\n              <div style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; padding:15px 0; border-bottom:1px solid #ececec; font-size:14px; line-height:1.5;\"><span style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:17px; color:#E30613;\">01<\u002Fspan><span>Presioná <b>Ctrl + Alt + Supr<\u002Fb> → aparece el menú de opciones.<\u002Fspan><\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; padding:15px 0; border-bottom:1px solid #ececec; font-size:14px; line-height:1.5;\"><span style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:17px; color:#E30613;\">02<\u002Fspan><span>Seleccioná <b>«Cambiar contraseña»<\u002Fb>.<\u002Fspan><\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; padding:15px 0; border-bottom:1px solid #ececec; font-size:14px; line-height:1.5;\"><span style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:17px; color:#E30613;\">03<\u002Fspan><span>Ingresá tu <b>contraseña actual<\u002Fb>.<\u002Fspan><\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; padding:15px 0; font-size:14px; line-height:1.5;\"><span style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:17px; color:#E30613;\">04<\u002Fspan><span>Escribí la <b>nueva contraseña<\u002Fb> y confirmala.<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- ===== 06 · Configuración de pantallas ===== -->\n          <div style=\"display:grid; grid-template-columns:0.82fr 1.18fr; gap:clamp(24px,4vw,56px); padding:34px 0 44px; border-bottom:1px solid #d8d8d8; align-items:start;\">\n            <div>\n              <div style=\"font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#666;\">hardware<\u002Fdiv>\n              <div style=\"display:flex; align-items:flex-start; gap:16px; margin-top:12px;\">\n                <span style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:clamp(40px,5vw,66px); line-height:0.78; letter-spacing:-0.03em; color:#E30613;\">06<\u002Fspan>\n                <h2 style=\"margin:0; font-family:'Archivo',sans-serif; font-weight:900; font-size:clamp(23px,2.9vw,34px); line-height:0.92; letter-spacing:-0.02em; text-transform:uppercase;\">Config. de<br>pantallas<\u002Fh2>\n              <\u002Fdiv>\n              <p style=\"margin:18px 0 0; font-size:13.5px; line-height:1.55; color:#333; max-width:320px;\">Notebook + monitor externo. lipboard.writeText(v); } catch (e) {}\n    this.setState({ copied: id });\n    clearTimeout(this._copyT);\n    this._copyT = setTimeout(() => this.setState({ copied: null }), 1500);\n  }\n\n  renderVals() {\n    const designed = ['home', 'rrhh', 'institucional', 'innovacion', 'qrated', 'mesa'];\n    const view = this.state.view ?? (this.props.startView || 'home');\n    const cap = (s) => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;\n\n    const navDefs = [\n      ['01', 'Institucional', 'institucional'],\n      ['02', 'RRHH', 'rrhh'],\n      ['03', 'Administración, Impuestos y Legales', 'adm'],\n      ['04', 'Contrataciones', 'contrataciones'],\n      ['05', 'Operaciones', 'operaciones'],\n      ['06', 'Producto', 'producto'],\n      ['07', 'Customer Care', 'customercare'],\n      ['08', 'Qrated', 'qrated'],\n      ['09', 'Sales', 'sales'],\n      ['10', 'Travel Designers', 'traveldesigners'],\n      ['11', 'IT', 'it'],\n      ['12', 'Mesa de Información', 'mesa'],\n      ['13', 'Responsables del Portal', 'responsables'],\n      ['14', 'Innovación', 'innovacion'],\n    ];\n    const nav = navDefs.map(([num, label, id]) => ({\n      num, label, id,\n      color: id === view ? '#E30613' : '#000',\n      onClick: () => this.go(id),\n    }));\n\n    const shortMap = {\n      institucional: 'Institucional', rrhh: 'RRHH', adm: 'Administración',\n      contrataciones: 'Contrataciones', operaciones: 'Operaciones', producto: 'Producto',\n      customercare: 'Customer Care', qrated: 'Qrated', sales: 'Sales', traveldesigners: 'Travel Designers',\n      it: 'IT', mesa: 'Mesa de Info', responsables: 'Responsables', innovacion: 'Innovación',\n    };\n    const placeMap = {\n      institucional: 'buenos aires', rrhh: 'equipo', adm: 'documentos', contrataciones: 'flota',\n      operaciones: 'perito moreno', producto: 'excursiones', customercare: 'pasajeros', qrated: 'premium · mice',\n      sales: 'clientes', traveldesigners: 'ruta 40', it: 'sistemas', mesa: 'soporte',\n      responsables: 'portal', innovacion: 'ia · scripts',\n    };\n    const tiles = navDefs.map(([num, label, id], i) => ({\n      num, id, label: shortMap[id] || label, place: placeMap[id] || '',\n      onClick: () => this.go(id),\n      accent: id === 'operaciones',\n    }));\n\n    const labelMap = {\n      home: 'inicio—', institucional: 'institucional—', rrhh: 'rrhh—',\n      adm: 'administración—', contrataciones: 'contrataciones—', operaciones: 'operaciones—',\n      producto: 'producto—', customercare: 'customer care—', qrated: 'qrated—', sales: 'sales—',\n      traveldesigners: 'travel designers—', it: 'it—', mesa: 'mesa de info—',\n      responsables: 'responsables—', innovacion: 'innovación—',\n    };\n    const numMap = {\n      institucional: '01', rrhh: '02', adm: '03', contrataciones: '04', operaciones: '05',\n      producto: '06', customercare: '07', qrated: '08', sales: '09', traveldesigners: '10',\n      it: '11', mesa: '12', responsables: '13', innovacion: '14',\n    };\n    const titleMap = {\n      adm: 'Administración', contrataciones: 'Contrataciones', operaciones: 'Operaciones',\n      producto: 'Producto', customercare: 'Customer Care', sales: 'Sales',\n      traveldesigners: 'Travel Designers', it: 'IT', mesa: 'Mesa de información',\n      responsables: 'Responsables del portal',\n    };\n\n    const clima = [\n      { city: 'Buenos Aires', temp: '13', cond: 'Parcial nublado', hi: '16', lo: '9' },\n      { city: 'El Calafate', temp: '2', cond: 'Nieve ligera', hi: '5', lo: '-3' },\n      { city: 'Ushuaia', temp: '-1', cond: 'Nublado', hi: '3', lo: '-4' },\n      { city: 'Salta', temp: '17', cond: 'Despejado', hi: '24', lo: '8' },\n    ];\n\n    const rrhh = [\n      { n: '01', title: 'Empleado', links: [\n        { t: 'Formulario de altas de personal', h: 'https://drive.google.com/drive/u/0/folders/1qCarwAsJhCp3noSeNa9UJOZktMASLZAl' },\n        { t: 'Carta vacaciones Eurotur', h: 'https://drive.google.com/drive/u/0/folders/1ESdsqm5G3rIaFKVWpRSXuvKe :#000;color:#fff;border:1px solid #000;',\n      live:  'background:#E30613;color:#fff;border:1px solid #E30613;',\n      dev:   'background:#fff;color:#000;border:1px solid #000;',\n      test:  'background:#fff;color:#E30613;border:1px solid #E30613;',\n      curso: 'background:#fff;color:#000;border:1px solid #000;',\n      ana:   'background:#fff;color:#8a8a8a;border:1px solid #d9d9d9;',\n      cero:  'background:#f6f5f2;color:#8a8a8a;border:1px solid #d9d9d9;',\n    };\n    const F = [\n      { id: 'f1', num: '01', area: 'Administrativo · Cuentas a pagar', owner: 'V. Homez · Y. Juárez', items: [\n        { n: 'Bot de carga en TourPlan', badge: 'Producción', cls: 'prod', desc: 'Procesó 600.000 líneas históricas: genera invoices y cheques con el costo real cargado contra cada línea.' },\n        { n: 'Conciliador de pagos duplicados', badge: 'Desarrollo', cls: 'dev', desc: 'Alerta REVISAR / CON FACTURAS PREVIAS / NUEVA por proveedor + file, antes de generar la OP.' },\n        { n: 'Chat IA de documentación', badge: 'Análisis', cls: 'ana', desc: 'Asistente que responde sobre procesos de CxP a partir de la documentación. Pendiente de aprobación.' },\n        { n: 'Comprobantes USD · Banco→Drive', badge: 'Sin iniciar', cls: 'cero', desc: 'Captura automática de comprobantes en dólares del banco a Drive. Pendiente de aprobación.' },\n        { n: 'Sistematización de pagos a guías', badge: 'Sin iniciar', cls: 'cero', desc: 'Anticipos, rendición de gastos y honorarios. Requiere documentar el proceso completo.' },\n      ]},\n      { id: 'f2', num: '02', area: 'Contrataciones · Base de datos', owner: 'M. Zanone', items: [\n        { n: 'Revalorización de tarifas (PCM)', badge: 'En TEST', cls: 'test', desc: 'Revaloriza el PCM cuando cambia un componente: modifica el servicio madre o crea temporada. Corre desde un prompt.' },\n        { n: 'Descarga de reportes TP NX', badge: 'Funciona', cls: 'live', desc: 'Bajada automática de reportes de Operations (Tour Summary y otros
